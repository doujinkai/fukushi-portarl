<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入居相談フォーム | 社会福祉法人 同仁会</title>

    <meta name="description" content="社会福祉法人同仁会 入居相談フォーム">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>

            <div class="logo-area">
                <!-- 後でロゴ画像を追加 -->
                <!-- <img src="images/logo.png" alt="社会福祉法人 同仁会"> -->
            </div>

            <h1>社会福祉法人 同仁会</h1>

            <p class="sub-title">
                入居相談フォーム
            </p>

        </header>

        <main>

            <section class="welcome">

                <h2>お気軽にご相談ください</h2>

                <p>
                    入居をご検討中の方やご家族の皆さまからの
                    ご相談・お問い合わせを受け付けています。
                </p>

                <p>
                    ご入力いただいた内容を確認後、
                    担当者よりご連絡いたします。
                </p>

                <a href="pages/contact.html" class="start-button">
                    入居相談を始める
                </a>

            </section>

            <section class="guide">

                <h2>ご利用の流れ</h2>

                <div class="flow">

                    <div class="step">
                        <span>①</span>
                        フォーム入力
                    </div>

                    <div class="step">
                        <span>②</span>
                        内容確認
                    </div>

                    <div class="step">
                        <span>③</span>
                        担当者よりご連絡
                    </div>

                </div>

            </section>

            <section class="contact-info">

                <h2>お電話でのお問い合わせ</h2>

                <p class="phone">
                    TEL：0276-00-0000
                </p>

                <p>
                    受付時間　平日 8:30～17:30
                </p>

            </section>

        </main>

        <footer>

            <p>
                © 社会福祉法人 同仁会
            </p>

        </footer>

    </div>

    <script src="script.js"></script>

</body>
</html>
